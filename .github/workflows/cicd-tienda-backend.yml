name: CI/CD Innovatech - Backend

on:
  push:
    branches: [ "deploy" ]
    #paths:
    #  - "backend/**"

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Login en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build y push imagen Backend
      env:
        DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKER_BUILDKIT: 0
      run: |
        docker build -t $DOCKER_USER/innovatech-backend:latest ./backend
        docker push $DOCKER_USER/innovatech-backend:latest

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Desplegar Backend en EC2 vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Desplegar innovatech-backend desde Docker Hub" \
          --parameters '{"commands":[
            "set -e",
            "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest",
            "docker stop innovatech-backend || true",
            "docker rm innovatech-backend || true",
            "docker run -d --name innovatech-backend -p 3001:3001 --env-file /home/ec2-user/backend/.env ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest"
          ]}' \
          --output text
name: CI/CD Innovatech - DB

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "db/**"

jobs:
  build-push-deploy-db:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Login en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build y push imagen DB
      run: |
        cd db
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-db:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-db:latest

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Desplegar DB en EC2 vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_DB_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Desplegar innovatech-db desde Docker Hub" \
          --parameters '{"commands":[
            "set -e",
            "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-db:latest",
            "docker stop innovatech-db || true",
            "docker rm innovatech-db || true",
            "docker run -d --name innovatech-db -p 3306:3306 -v innovatech-db-data:/var/lib/mysql --env-file /home/ec2-user/db/.env ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-db:latest"
          ]}' \
          --output text
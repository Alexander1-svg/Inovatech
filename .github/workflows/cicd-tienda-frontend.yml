name: CI/CD Innovatech - Frontend

on:
  push:
    branches: [ "deploy" ]
    # paths:
    #  - "frontend/**"

jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Login en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build y push imagen Frontend
      run: |
        docker build -t alexander1svg/innovatech-frontend:latest ./frontend
        docker push alexander1svg/innovatech-frontend:latest

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Desplegar Frontend en EC2 vía SSM
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --comment "Desplegar innovatech-frontend desde Docker Hub" \
          --parameters '{"commands":[
            "set -e",
            "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest",
            "docker stop innovatech-frontend || true",
            "docker rm innovatech-frontend || true",
            "docker run -d --name innovatech-frontend -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest"
          ]}' \
          --output text